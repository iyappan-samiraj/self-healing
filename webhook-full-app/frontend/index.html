<!DOCTYPE html>
<html>
<head>
  <title>Self Healing Dashboard</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      font-size: 18px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .repo-link {
      text-decoration: none;
      color: #38bdf8;
      font-size: 14px;
    }

    .repo-link:hover {
      color: #0ea5e9;
    }

    /* LAYOUT */
    .app {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 320px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:disabled {
      background: gray;
    }

    /* STATUS */
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .processing { background: #f59e0b; }
    .completed { background: #22c55e; }
    .failed { background: #ef4444; }

    /* JSON VIEWER */
    .json-container {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      max-height: 450px;
      overflow: auto;
      font-family: monospace;
      font-size: 13px;
    }

    .json-node {
      margin-top: 4px;
    }

    .json-line {
      cursor: pointer;
    }

    .toggle {
      color: #facc15;
      margin-right: 6px;
    }

    .json-key {
      color: #38bdf8;
    }

    .json-value {
      color: #22c55e;
    }

    .json-bracket {
      color: #94a3b8;
    }

    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🚀 Self-Healing Log Dashboard</div>
  <a href="https://github.com/iyappan-samiraj/self-healing" target="_blank" class="repo-link">
    🔗 View Repo
  </a>
</div>

<div id="root"></div>

<script type="text/babel">

/* JSON TREE VIEWER */
function JsonTree({ data, level = 0 }) {
  const [open, setOpen] = React.useState(level < 1);

  const isObject = typeof data === "object" && data !== null;

  if (!isObject) {
    return (
      <span className="json-value">
        {JSON.stringify(data)}
      </span>
    );
  }

  const isArray = Array.isArray(data);
  const entries = isArray ? data : Object.entries(data);

  return (
    <div className="json-node" style={{ marginLeft: level * 12 }}>
      <div className="json-line" onClick={() => setOpen(!open)}>
        <span className="toggle">{open ? "➖" : "➕"}</span>
        <span className="json-bracket">
          {isArray ? "[" : "{"}
        </span>
      </div>

      {open && (
        <div>
          {isArray
            ? data.map((item, i) => (
                <div key={i}>
                  <JsonTree data={item} level={level + 1} />
                </div>
              ))
            : entries.map(([key, value]) => (
                <div key={key}>
                  <span className="json-key">{key}: </span>
                  <JsonTree data={value} level={level + 1} />
                </div>
              ))}
        </div>
      )}

      <div className="json-bracket">
        {isArray ? "]" : "}"}
      </div>
    </div>
  );
}

/* MAIN APP */
function App() {
  const [file, setFile] = React.useState(null);
  const [status, setStatus] = React.useState("");
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  async function uploadFile() {
    if (!file) return;

    setLoading(true);
    setStatus("processing");

    const fd = new FormData();
    fd.append("file", file);

    try {
      const res = await fetch("/upload", {
        method: "POST",
        body: fd
      });

      const data = await res.json();

      poll(data.data.execution_id, data.data.polling_token);

    } catch (err) {
      setStatus("failed");
      setLoading(false);
    }
  }

  /* POLLING */
  function poll(id, token) {
    let attempts = 0;
    const maxAttempts = 50;

    const interval = setInterval(async () => {
      try {
        const res = await fetch(`/status/${id}?token=${token}`);
        const data = await res.json();

        if (!data || !data.data) return;

        const s = data.data.status;
        const outputs = data.data.outputs || {};

        setStatus(s);
        setResult(outputs);

        const nodeCount = Object.keys(outputs).length;
        attempts++;

        if (
          (s === "completed" && nodeCount >= 10) ||
          attempts > maxAttempts
        ) {
          clearInterval(interval);
          setLoading(false);
        }

      } catch (err) {
        setStatus("failed");
        clearInterval(interval);
        setLoading(false);
      }
    }, 3000);
  }

  return (
    <div className="app">

      {/* LEFT PANEL */}
      <div className="card">
        <h2>📤 Upload File</h2>

        <input
          type="file"
          onChange={(e) => setFile(e.target.files[0])}
        />

        {file && <p>{file.name}</p>}

        <button onClick={uploadFile} disabled={!file || loading}>
          {loading ? "Processing..." : "Upload & Process"}
        </button>
      </div>

      {/* RIGHT PANEL */}
      <div className="card">
        <h2>📊 Status</h2>

        {status && (
          <div className={`status ${status}`}>
            {status}
          </div>
        )}

        {result && (
          <>
            <h3>Result</h3>
            <div className="json-container">
              <JsonTree data={result} />
            </div>
          </>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
