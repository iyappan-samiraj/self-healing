<!DOCTYPE html>
<html>
<head>
  <title>Self Healing Dashboard</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    .header {
      padding: 15px 20px;
      font-size: 20px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .app {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 320px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    .nodes-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .node-card {
      background: #020617;
      border: 1px solid #334155;
      padding: 15px;
      border-radius: 10px;
      width: 280px;
      transition: 0.2s;
      cursor: pointer;
    }

    .node-card:hover {
      transform: scale(1.03);
      border-color: #38bdf8;
    }

    .node-header {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .node-success {
      border-left: 4px solid #22c55e;
    }

    .node-fail {
      border-left: 4px solid #ef4444;
    }

    .node-running {
      border-left: 4px solid #f59e0b;
    }

    .label {
      color: #94a3b8;
      font-size: 12px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
      margin-top: 10px;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .processing { background: orange; }
    .completed { background: green; }
    .failed { background: red; }

    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="header">🚀 Self-Healing Log Dashboard</div>
<div id="root"></div>

<script type="text/babel">

function NodeCard({ name, data }) {
  const [open, setOpen] = React.useState(false);

  const isSuccess = data?.result === true;
  const isError = data?.error;

  let statusClass = "node-running";
  if (isSuccess) statusClass = "node-success";
  if (isError) statusClass = "node-fail";

  return (
    <div className={`node-card ${statusClass}`} onClick={() => setOpen(!open)}>
      <div className="node-header">
        {isSuccess ? "🟢" : isError ? "🔴" : "🟡"} {name}
      </div>

      <div><span className="label">Result:</span> {String(data?.result)}</div>
      <div><span className="label">Decision:</span> {String(data?.decision)}</div>

      {open && (
        <>
          <hr />
          <div><span className="label">Tokens:</span> {data?.tokens_used}</div>
          <div><span className="label">Model:</span> {data?.model_used}</div>
          <div><span className="label">Section:</span> {data?.metadata?.section}</div>

          {data?.error && (
            <div style={{ color: "red" }}>
              Error: {JSON.stringify(data.error)}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function App() {
  const [file, setFile] = React.useState(null);
  const [status, setStatus] = React.useState("");
  const [result, setResult] = React.useState({});
  const [loading, setLoading] = React.useState(false);

  async function uploadFile() {
    if (!file) return;

    setLoading(true);
    setStatus("processing");

    const fd = new FormData();
    fd.append("file", file);

    try {
      const res = await fetch("/upload", {
        method: "POST",
        body: fd
      });

      const data = await res.json();

      poll(data.data.execution_id, data.data.polling_token);

    } catch (err) {
      setStatus("failed");
      setLoading(false);
    }
  }

  function poll(id, token) {
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`/status/${id}?token=${token}`);
        const data = await res.json();

        if (!data || !data.data) return;

        const s = data.data.status;
        const outputs = data.data.outputs || {};

        setStatus(s);
        setResult(outputs);

        const nodeCount = Object.keys(outputs).length;

        if (s === "completed" && nodeCount >= 10) {
          clearInterval(interval);
          setLoading(false);
        }

      } catch (err) {
        setStatus("failed");
        clearInterval(interval);
        setLoading(false);
      }
    }, 3000);
  }

  return (
    <div className="app">

      <div className="card">
        <h2>📤 Upload</h2>

        <input type="file" onChange={(e) => setFile(e.target.files[0])} />
        {file && <p>{file.name}</p>}

        <button onClick={uploadFile} disabled={!file || loading}>
          {loading ? "Processing..." : "Upload & Process"}
        </button>
      </div>

      <div className="card">
        <h2>📊 Status</h2>

        {status && <div className={`status ${status}`}>{status}</div>}

        <h3>Nodes</h3>

        <div className="nodes-container">
          {Object.entries(result).map(([key, value]) => (
            <NodeCard key={key} name={key} data={value} />
          ))}
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
