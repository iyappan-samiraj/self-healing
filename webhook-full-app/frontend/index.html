<!DOCTYPE html>
<html>
<head>
  <title>Self Healing Dashboard</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    .header {
      padding: 15px 20px;
      font-size: 20px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .app {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 320px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
      margin-top: 10px;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .processing { background: orange; }
    .completed { background: green; }
    .failed { background: red; }

    /* JSON Viewer */
    .json-node {
      margin-left: 10px;
      border-left: 1px solid #334155;
      padding-left: 10px;
    }

    .json-key {
      color: #38bdf8;
    }

    .json-value {
      color: #22c55e;
    }

    .toggle {
      cursor: pointer;
      color: yellow;
    }

    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="header">🚀 Self-Healing Log Dashboard</div>
<div id="root"></div>

<script type="text/babel">

/* JSON VIEWER COMPONENT */
function JsonViewer({ data }) {
  if (typeof data !== "object" || data === null) {
    return <span className="json-value">{JSON.stringify(data)}</span>;
  }

  return (
    <div className="json-node">
      {Object.entries(data).map(([key, value]) => (
        <div key={key}>
          <span className="json-key">{key}: </span>
          {typeof value === "object" ? (
            <JsonViewer data={value} />
          ) : (
            <span className="json-value">{JSON.stringify(value)}</span>
          )}
        </div>
      ))}
    </div>
  );
}

/* MAIN APP */
function App() {
  const [file, setFile] = React.useState(null);
  const [status, setStatus] = React.useState("");
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  async function uploadFile() {
    if (!file) return;

    setLoading(true);
    setStatus("processing");

    const fd = new FormData();
    fd.append("file", file);

    try {
      const res = await fetch("/upload", {
        method: "POST",
        body: fd
      });

      const data = await res.json();

      const id = data.data.execution_id;
      const token = data.data.polling_token;

      poll(id, token);

    } catch (err) {
      setStatus("failed");
      setLoading(false);
    }
  }

  /* 🔥 POLLING WITH MIN 10 NODES CONDITION */
  function poll(id, token) {
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`/status/${id}?token=${token}`);
        const data = await res.json();

        if (!data.success) {
          setStatus("failed");
          clearInterval(interval);
          return;
        }

        const s = data?.data?.status;
        const outputs = data?.data?.outputs;

        setStatus(s);

        // ✅ count nodes
        const nodeCount = outputs ? Object.keys(outputs).length : 0;

        console.log("Node count:", nodeCount);

        // 🔥 CONDITION: wait until completed + at least 10 nodes
        if (s === "completed" && nodeCount >= 10) {
          clearInterval(interval);
          setResult(outputs);
          setLoading(false);
        }

      } catch (err) {
        setStatus("failed");
        clearInterval(interval);
      }
    }, 3000);
  }

  return (
    <div className="app">

      {/* LEFT */}
      <div className="card">
        <h2>📤 Upload File</h2>

        <input
          type="file"
          onChange={(e) => setFile(e.target.files[0])}
        />

        {file && <p>{file.name}</p>}

        <button onClick={uploadFile} disabled={!file || loading}>
          {loading ? "Processing..." : "Upload & Process"}
        </button>
      </div>

      {/* RIGHT */}
      <div className="card">
        <h2>📊 Status</h2>

        {status && (
          <div className={`status ${status}`}>
            {status}
          </div>
        )}

        {result && (
          <>
            <h3>Result</h3>
            <JsonViewer data={result} />
          </>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
